name: Update chnroutes

on:
  schedule:
    # 每天 00:00 UTC 自动更新（北京时间 08:00）
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate route files
        run: python scripts/generate.py --download

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add chnroutes.txt chnroutes-v4 chnroutes-v6 metadata.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: auto-update chnroutes $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            git push
          fi
